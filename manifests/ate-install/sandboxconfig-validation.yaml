# Per-sandbox-class asset requirements for SandboxConfig. The CRD schema is
# generic (any arch -> any asset name -> {url, sha256}); this policy enforces the
# requirements a given sandbox class actually needs, fail-closed at apply time.
# (url/sha256 being required and well-formed is enforced by the CRD schema.)
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingAdmissionPolicy
metadata:
  name: sandboxconfig-assets
spec:
  failurePolicy: Fail
  matchConstraints:
    resourceRules:
    - apiGroups:   ["ate.dev"]
      apiVersions: ["v1alpha1"]
      operations:  ["CREATE", "UPDATE"]
      resources:   ["sandboxconfigs"]
  validations:
  # gVisor needs a "runsc" asset for every architecture it advertises.
  - expression: >-
      object.spec.sandboxClass != 'gvisor' ||
      (has(object.spec.assets) && size(object.spec.assets) > 0 &&
       object.spec.assets.all(arch, 'runsc' in object.spec.assets[arch]))
    message: "a gvisor SandboxConfig must define a 'runsc' asset for every architecture under spec.assets"
  # The micro-VM (cloud-hypervisor) runtime needs its asset set for every
  # architecture it advertises.
  - expression: >-
      object.spec.sandboxClass != 'microvm' ||
      (has(object.spec.assets) && size(object.spec.assets) > 0 &&
       object.spec.assets.all(arch,
         ['cloud-hypervisor', 'kata-kernel', 'kata-image', 'kata-config']
           .all(name, name in object.spec.assets[arch])))
    message: "a microvm SandboxConfig must define cloud-hypervisor, kata-kernel, kata-image, and kata-config assets for every architecture under spec.assets"
---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingAdmissionPolicyBinding
metadata:
  name: sandboxconfig-assets
spec:
  policyName: sandboxconfig-assets
  validationActions: ["Deny"]
