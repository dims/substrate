version: 2
updates:
  - package-ecosystem: "gomod"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      go-deps:
        patterns: ["*"]

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"

  - package-ecosystem: "docker"
    directory: "/benchmarking/locust"
    schedule:
      interval: "weekly"

  - package-ecosystem: "docker"
    directory: "/demos/claude-code-multiplex/workload"
    schedule:
      interval: "weekly"
